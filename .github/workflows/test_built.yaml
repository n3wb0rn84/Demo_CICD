name: Test and Build

on: [workflow_dispatch]

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Vérification des fichiers présents dans le runner
        run: ls -a -l

      - name: Clone du projet dans le runner (checkout)
        uses: actions/checkout@v6

      - name: Vérification des fichiers présents après le checkout
        run: ls -a -l
      
      - name: Installation de l'environnement Node.js
        uses: actions/setup-node@v6

      - name: Clean install de dépendance (node_module , npm)
        run: npm ci

      - name: Lancement des tests unitaires 
        run: npm run test
      
      - name: Mailage en cas de foirage du test
        if: failure()
        uses: JaSiLez/smtp-notifier@main
        with:
          server_address: ${{ vars.SMTP_SERVER }}
          server_port: ${{ vars.SMTP_PORT }}
          secure: true
          from: ${{ secrets.FROM_EMAIL }}
          to: digitalcity@yopmail.com
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🚀 Deployment failed!"
          html_body: "<h1>Et merde! Ca a foiré !</h1>"

      - name: Build de l'app
        run: npm run build

      - name: Vérifier le résultat du build ( Projet "Hello world")
        run: npm run start